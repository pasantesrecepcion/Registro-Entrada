<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacorp CEDIS - Registro de Ingreso</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --fc-blue: #0056b3;
            --fc-blue-hover: #004085;
            --bg-main: #f4f6f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 550px;
            padding: 32px;
            border-top: 6px solid var(--fc-blue);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            color: var(--fc-blue);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
            /* Esencial para que la lista flotante se alinee al input */
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        #empresa {
            text-transform: uppercase;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--fc-blue);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.15);
        }

        /* --- ESTILOS DE LA LISTA FLOTANTE DE AUTOCOMPLETADO --- */
        .autocomplete-wrapper {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            max-height: 210px;
            overflow-y: auto;
            z-index: 999;
            margin-top: 4px;
            display: none;
        }

        .autocomplete-option {
            padding: 11px 14px;
            cursor: pointer;
            font-size: 13.5px;
            color: var(--text-main);
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.15s ease;
            text-transform: uppercase;
        }

        .autocomplete-option:last-child {
            border-bottom: none;
        }

        .autocomplete-option:hover {
            background-color: #f1f5f9;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--fc-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--fc-blue-hover);
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: none;
            border: 1px solid var(--fc-blue);
            color: var(--fc-blue);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            margin-top: 14px;
            transition: all 0.2s ease;
        }

        .btn-link:hover {
            background-color: rgba(0, 86, 179, 0.05);
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--fc-blue);
            color: white;
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            z-index: 9999;
            text-transform: uppercase;
        }

        .toast.show {
            top: 30px;
            opacity: 1;
        }
    </style>
</head>

<body>

    <div id="toastNotification" class="toast">
        <i class="ph ph-check-circle" style="font-size: 22px;"></i>
        <span>¡Registro Exitoso!</span>
    </div>

    <div class="form-container">
        <div class="header">
            <h1>BIENVENIDOS</h1>
            <p>Por favor, registre su ingreso a las instalaciones.</p>
        </div>

        <form id="recepcionForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="EJ. JUAN PEREZ" required>
            </div>

            <div class="form-group">
                <label for="empresa">Empresa / Institución (Proveedor)</label>
                <input type="text" id="empresa" placeholder="EJ. FARMACORP S.A." required autocomplete="off">
                <div id="autocompleteResults" class="autocomplete-wrapper"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="ci">CI / Documento</label>
                    <input type="text" id="ci" placeholder="NUMERO DE DOCUMENTO" required
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono / Celular</label>
                    <input type="tel" id="telefono" placeholder="NUMERO DE CONTACTO" required
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="personas">Personas</label>
                    <input type="number" id="personas" value="1" min="1" required>
                </div>
                <div class="form-group">
                    <label for="puerta">Puerta</label>
                    <select id="puerta" required>
                        <option value="" disabled selected>SELECCIONE LA PUERTA</option>
                        <option value="Puerta Principal">Puerta Principal</option>
                        <option value="Puerta 1">Puerta 1</option>
                        <option value="Puerta 2">Puerta 2</option>
                        <option value="Puerta 3">Puerta 3</option>
                        <option value="Puerta 4">Puerta 4</option>
                        <option value="Puerta 5">Puerta 5</option>
                        <option value="Puerta 6">Puerta 6</option>
                        <option value="Puerta 7">Puerta 7</option>
                        <option value="Puerta 8">Puerta 8</option>
                        <option value="Puerta 9">Puerta 9</option>
                        <option value="Puerta 10">Puerta 10</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="areaDestino">Área Destino</label>
                <select id="areaDestino" required>
                    <option value="" disabled selected>SELECCIONE EL ÁREA</option>
                    <option value="LOGISTICA INVERSA">LOGÍSTICA INVERSA</option>
                    <option value="RECEPCION">RECEPCIÓN</option>
                    <option value="MANTENIMIENTO">MANTENIMIENTO</option>
                    <option value="RRHH">RRHH</option>
                    <option value="OTROS">OTROS</option>
                </select>
            </div>

            <div class="form-group">
                <label for="motivoVisita">Motivo de Visita</label>
                <select id="motivoVisita" required disabled>
                    <option value="" disabled selected>-- ELIJA ÁREA PRIMERO --</option>
                </select>
            </div>

            <div class="form-group hidden" id="especifiqueMotivoGroup">
                <label for="motivoDetalle">Especifique el Motivo</label>
                <textarea id="motivoDetalle" rows="2" placeholder="DESCRIBA BREVEMENTE EL MOTIVO..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Registrar Entrada</button>
            <a href="panel.html" class="btn-link">
                <i class="ph ph-chart-bar"></i> Ir al Panel de Gestión (Monitoreo)
            </a>
        </form>
    </div>

    <script src="app.js" defer></script>
</body>

</html>
